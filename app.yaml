command:
  - python
  - -m
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: APP_ENV
    value: production
  - name: PGHOST
    valueFrom: lakebase-db
  - name: PGPORT
    valueFrom: lakebase-db
  - name: PGDATABASE
    valueFrom: lakebase-db
  - name: PGUSER
    valueFrom: lakebase-db

resources:
  - name: lakebase-db
    type: database
