name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "configs/**"
      - "terraform/**"

  workflow_dispatch:
    inputs:
      product_name:
        description: "Product name to apply"
        required: false
      product_id:
        description: "Product UUID for webhook callback"
        required: false

permissions:
  contents: read

env:
  TF_VERSION: "1.9.0"

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install pyyaml

      - name: Generate tfvars from YAML configs
        run: python ../scripts/yaml_to_tf.py --config-dir ../configs --output-dir data-products

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

      - name: Callback to DPVM (success)
        if: success() && inputs.product_id
        run: |
          curl -X POST "${{ secrets.DPVM_WEBHOOK_URL }}/api/webhooks/github" \
            -H "Content-Type: application/json" \
            -d '{
              "product_id": "${{ inputs.product_id }}",
              "status": "success",
              "run_id": "${{ github.run_id }}"
            }'

      - name: Callback to DPVM (failure)
        if: failure() && inputs.product_id
        run: |
          curl -X POST "${{ secrets.DPVM_WEBHOOK_URL }}/api/webhooks/github" \
            -H "Content-Type: application/json" \
            -d '{
              "product_id": "${{ inputs.product_id }}",
              "status": "failure",
              "run_id": "${{ github.run_id }}",
              "details": "Terraform apply failed. Check workflow run for details."
            }'
